name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --prefix packages/contracts
      - run: npm run generate --prefix packages/contracts
      - run: |
          diff -q packages/contracts/domain/features.json apps/api/contracts/domain/features.json || (echo "features.json out of sync" && exit 1)

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haus
          POSTGRES_PASSWORD: haus
          POSTGRES_DB: haus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go build ./...
        working-directory: apps/api
      - run: go test ./...
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://haus:haus@localhost:5432/haus?sslmode=disable

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --prefix packages/contracts && npm run generate --prefix packages/contracts
      - run: npm install --prefix apps/web
      - run: node apps/web/scripts/check-nav-routes.mjs
      - run: node apps/web/scripts/generate-e2e-routes.mjs --check
      - run: npm run build --prefix apps/web

  e2e:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --prefix packages/contracts && npm run generate --prefix packages/contracts
      - run: npm install --prefix apps/web
      - run: node apps/web/scripts/generate-e2e-routes.mjs
      - name: Start stack
        run: docker compose -f infra/docker/compose.yml up -d --build
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18432/health; then exit 0; fi
            sleep 5
          done
          exit 1
      - name: Wait for production web
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/login | grep -qE '^[23]'; then exit 0; fi
            sleep 5
          done
          exit 1
      - name: Seed demo data
        run: docker compose -f infra/docker/compose.yml run --rm api /app/seed
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
        working-directory: apps/web
      - name: Run E2E tests
        run: npm run test:e2e:smoke
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          PLAYWRIGHT_API_URL: http://localhost:18432
          PLAYWRIGHT_CHANNEL: chromium
          E2E_PROD: "1"
          CI: "true"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
