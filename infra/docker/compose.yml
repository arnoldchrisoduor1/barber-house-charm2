name: haus-wellness

# Production: https://hauseoftech.com (web) · https://api.hauseoftech.com (API)
# Local dev origins kept in CORS for testing on :3001 / :18432.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: haus
      POSTGRES_PASSWORD: haus
      POSTGRES_DB: haus
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haus -d haus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - miniodata:/data

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: ["/app/migrate", "up"]
    environment:
      DATABASE_URL: postgres://haus:haus@postgres:5432/haus?sslmode=disable
      MIGRATIONS_PATH: /app/migrations
    volumes:
      - ../../infra/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      APP_ENV: local
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://haus:haus@postgres:5432/haus?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_ACCESS_TTL: 24h
      CORS_ORIGINS: https://hauseoftech.com,https://www.hauseoftech.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: haus-media
      S3_USE_SSL: "false"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@hausofwellness.local
      # Production SMTP (override via .env):
      # SMTP_HOST: smtp.gmail.com
      # SMTP_PORT: "587"
      # SMTP_USER: ${SMTP_USER}
      # SMTP_PASSWORD: ${SMTP_PASSWORD}
      # SMTP_USE_STARTTLS: "true"
      # EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      # EMAIL_FROM_NAME: Haus of Wellness
      # EMAIL_DRY_RUN: "false"
      PUBLIC_WEB_URL: http://localhost:3001
    ports:
      - "18432:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: ["/app/worker"]
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://haus:haus@postgres:5432/haus?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://api.hauseoftech.com
    environment:
      NEXT_PUBLIC_API_URL: https://api.hauseoftech.com
      API_URL: http://api:8080
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s 
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  caddydata:
